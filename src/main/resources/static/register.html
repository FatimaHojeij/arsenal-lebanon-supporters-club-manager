<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALSC — Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page-center" style="padding: 40px 24px">
    <div class="card" style="max-width:520px">
        <div class="brand-block">
            <div class="crest">🔴</div>
            <h2>Register New Member</h2>
            <p>Fill in your details to apply for membership</p>
        </div>

        <form id="register-form" novalidate>
            <div class="form-group">
                <label for="title">Title</label>
                <select id="title">
                    <option value="Mr">Mr</option>
                    <option value="Mrs">Mrs</option>
                    <option value="Miss">Miss</option>
                    <option value="Ms">Ms</option>
                    <option value="Dr">Dr</option>
                </select>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="Bukayo" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Saka" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a secure password" required>
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="+96170123456">
            </div>

            <div class="form-group">
                <label for="dateOfBirth">Date of Birth</label>
                <input type="date" id="dateOfBirth" required>
            </div>

            <div class="form-group">
                <label for="country">Country</label>
                <input type="text" id="country" value="Lebanon" required>
            </div>

            <div id="response-message" class="alert hidden"></div>

            <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Submit Registration</button>
        </form>

        <p class="text-center mt-4" style="font-size:0.875rem">
            Already a member? <a href="/index.html" style="color:var(--red);font-weight:600">Log in</a>
        </p>
    </div>
</div>
<script type="module" src="/js/register.js"></script>
</body>
</html>
