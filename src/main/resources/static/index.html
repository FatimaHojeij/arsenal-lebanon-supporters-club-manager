<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALSC — Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page-center">
    <div class="card">
        <div class="brand-block">
            <div class="crest">🔴</div>
            <h2>ALSC Member Portal</h2>
            <p>Arsenal Lebanon Supporters Club</p>
        </div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <div id="login-error" class="alert alert-error hidden"></div>

            <button type="submit" id="login-btn" class="btn btn-primary btn-block">Log In</button>
        </form>

        <p class="text-center mt-4" style="font-size:0.875rem">
            <a id="forgot-password-link" href="#" style="color:var(--red);font-weight:600">Forgot password?</a>
        </p>
        <p class="text-center mt-2" style="font-size:0.875rem">
            New supporter? <a href="/register.html" style="color:var(--red);font-weight:600">Register here</a>
        </p>
    </div>
</div>
<script type="module" src="/js/auth.js"></script>
</body>
</html>
